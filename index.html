<style>
  *, *::before, *::after { box-sizing: border-box; }

  #root {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, #3a2a1a 0%, #2b1f15 60%, #1a120c 100%);
  }
  .stage {
    position: relative;
    width: 100%;
    max-width: 420px;
    height: 100vh;
    max-height: 860px;
    background: #f4ede0;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,0,0,0.3);
  }
  @media (min-width: 500px) {
    .stage { border-radius: 28px; height: 860px; }
    .stage::before, .stage::after {
      content: ''; position: absolute; width: 40px; height: 40px;
      pointer-events: none; border: 2px solid #3a2a1a; z-index: 10;
    }
    .stage::before { top: 8px; left: 8px; border-right: none; border-bottom: none; }
    .stage::after  { bottom: 8px; right: 8px; border-left: none; border-top: none; }
  }
  .app-mount {
    position: absolute; inset: 0;
    overflow-y: auto; -webkit-overflow-scrolling: touch;
  }
  .app-mount::-webkit-scrollbar { width: 0; }

  @keyframes vt-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  @keyframes vt-fade { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes vt-ticket { 0% { opacity: 0; transform: translateY(30px) rotate(-4deg); } 60% { transform: translateY(-4px) rotate(0.8deg); } 100% { opacity: 1; transform: translateY(0) rotate(0); } }
  @keyframes vt-bounce { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-10px) scale(1.03); } }
  @keyframes vt-confetti-fall {
    0%   { transform: translate3d(0, -20px, 0) rotate(0deg); opacity: 0; }
    8%   { opacity: 1; }
    100% { transform: translate3d(var(--dx, 0), 900px, 0) rotate(var(--rot, 720deg)); opacity: 0.8; }
  }
</style>

function todayISO() {
  const n = new Date();
  return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
}
function currentDayIndex(state) {
  const t = todayISO();
  let i = COLLEGE_DAYS.findIndex(d => d >= t);
  if (i === -1) i = COLLEGE_DAYS.length - 1;
  return i;
}
function remainingCount(state) { return COLLEGE_DAYS.filter(d => !state.picks[d]).length; }
function availableStudents(state) {
  const used = new Set(Object.values(state.picks).map(p => p.student));
  return STUDENTS.filter(s => !used.has(s));
}
function availableCounties(state) {
  const used = new Set(Object.values(state.picks).map(p => p.county));
  return COUNTIES.filter(c => !used.has(c.name));
}
function formatDate(iso) {
  const d = new Date(iso+'T00:00:00Z');
  return {
    weekday: ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getUTCDay()],
    day: d.getUTCDate(),
    month: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getUTCMonth()],
    year: d.getUTCFullYear()
  };
}
function quoteForDate(iso) {
  let h = 0;
  for (let i = 0; i < iso.length; i++) h = (h * 31 + iso.charCodeAt(i)) | 0;
  return QUOTES[Math.abs(h) % QUOTES.length];
}
function ordinal(n) {
  const s = ['th','st','nd','rd'], v = n % 100;
  return n + (s[(v-20)%10] || s[v] || s[0]);
}

// AUDIO
function useAudio(soundOn) {
  const ctx = useMemo(() => {
    try { return new (window.AudioContext||window.webkitAudioContext)(); } catch(e) { return null; }
  }, []);
  const tick = useCallback(() => {
    if (!ctx || !soundOn) return;
    try {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'square'; o.frequency.value = 600 + Math.random()*300;
      g.gain.setValueAtTime(0.04, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.04);
      o.connect(g); g.connect(ctx.destination);
      o.start(); o.stop(ctx.currentTime+0.05);
    } catch(e) {}
  }, [ctx, soundOn]);
  const ding = useCallback(() => {
    if (!ctx || !soundOn) return;
    try {
      [660,880,1100].forEach((f,i) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'sine'; o.frequency.value = f;
        const t = ctx.currentTime + i*0.08;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.12, t+0.02);
        g.gain.exponentialRampToValueAtTime(0.001, t+0.6);
        o.connect(g); g.connect(ctx.destination);
        o.start(t); o.stop(t+0.65);
      });
    } catch(e) {}
  }, [ctx, soundOn]);
  const resume = useCallback(() => { try { ctx && ctx.resume(); } catch(e) {} }, [ctx]);
  return { tick, ding, resume };
}

// CONFETTI
function Confetti() {
  const pieces = useMemo(() => {
    const colors = ['#b33c20','#d4a15a','#3a2a1a','#8a6a4a','#c9b99a','#fff8ea'];
    return Array.from({length:70},(_,i) => ({
      id: i,
      left: Math.random()*100,
      dx: (Math.random()-0.5)*200,
      rot: 360+Math.random()*720,
      delay: Math.random()*0.8,
      dur: 2.8+Math.random()*1.8,
      size: 6+Math.random()*8,
      color: colors[Math.floor(Math.random()*colors.length)],
      strip: Math.random()>0.5
    }));
  }, []);
  return (
    <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none',zIndex:20}}>
      {pieces.map(p => (
        <div key={p.id} style={{
          position:'absolute', top:-20, left:p.left+'%',
          width: p.strip ? p.size*0.35 : p.size,
          height: p.strip ? p.size*1.4 : p.size*0.6,
          background: p.color,
          animation: `vt-confetti-fall ${p.dur}s ${p.delay}s cubic-bezier(0.25,0.46,0.45,0.94) forwards`,
          '--dx': p.dx+'px', '--rot': p.rot+'deg',
          boxShadow:'0 1px 2px rgba(0,0,0,0.15)'
        }}/>
      ))}
    </div>
  );
}

// TWEAKS
function Tweaks({ settings, setSettings, onReset }) {
  const [open, setOpen] = useState(true);
  const toggle = on => ({background:on?'#b33c20':'transparent',color:on?'#f4ede0':'#8a6a4a',border:`1px solid ${on?'#b33c20':'#8a6a4a'}`,padding:'4px 10px',fontSize:11,fontFamily:'Playfair Display,serif',fontStyle:'italic',borderRadius:2,cursor:'pointer'});
  if (!open) return <button onClick={() => setOpen(true)} style={S.tweakFab}>⚙</button>;
  const row = (label,el) => (
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px dotted #c9b99a'}}>
      <span style={{fontFamily:'Lora,serif',fontStyle:'italic',fontSize:12,color:'#3a2a1a'}}>{label}</span>
      {el}
    </div>
  );
  return (
    <div style={S.tweaks}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <div style={{fontFamily:'Playfair Display,serif',fontWeight:700,fontSize:14,color:'#3a2a1a'}}>Tweaks</div>
        <button onClick={() => setOpen(false)} style={{background:'transparent',border:'none',cursor:'pointer',color:'#8a6a4a',fontSize:16}}>×</button>
      </div>
      {row('Sound on draw', <button onClick={() => setSettings({...settings,sound:!settings.sound})} style={toggle(settings.sound)}>{settings.sound?'on':'off'}</button>)}
      {row('One draw per day (strict)', <button onClick={() => setSettings({...settings,strictOnePerDay:!settings.strictOnePerDay})} style={toggle(settings.strictOnePerDay)}>{settings.strictOnePerDay?'on':'off'}</button>)}
      <div style={{paddingTop:10}}>
        <button onClick={onReset} style={{...S.paperBtn,background:'#8a6a4a',width:'100%',padding:'8px',fontSize:11}}>⟲ Reset all tickets (testing)</button>
      </div>
    </div>
  );
}

// APP
function App() {
  const [state, setState] = useState(() => loadState());
  const [screen, setScreen] = useState('home');
  const [rolling, setRolling] = useState(false);
  const [animS, setAnimS] = useState('');
  const [animC, setAnimC] = useState('');
  const [landed, setLanded] = useState(false);
  const [lastResult, setLastResult] = useState(null);
  const [settings, setSettings] = useState({sound:true,strictOnePerDay:false,showTweaks:false});

  const persist = n => { setState(n); saveState(n); };
  const currentDay = COLLEGE_DAYS[currentDayIndex(state)];
  const remaining = remainingCount(state);
  const todaysPick = state.picks[currentDay];
  const studentPool = availableStudents(state);
  const countyPool = availableCounties(state);
  const usedCounties = new Set(Object.values(state.picks).map(p => p.county));
  const allDone = remaining === 0;

  const { tick, ding, resume } = useAudio(settings.sound);

  useEffect(() => {
    const onMsg = e => {
      const d = e.data;
      if (!d || typeof d !== 'object') return;
      if (d.type === '__activate_edit_mode') setSettings(s => ({...s, showTweaks:true}));
      if (d.type === '__deactivate_edit_mode') setSettings(s => ({...s, showTweaks:false}));
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const spin = useCallback(() => {
    if (!studentPool.length || !countyPool.length) return;
    if (settings.strictOnePerDay && todaysPick) return;
    resume();
    const s = studentPool[Math.floor(Math.random()*studentPool.length)];
    const c = countyPool[Math.floor(Math.random()*countyPool.length)];
    setRolling(true);
    setLanded(false);
    setAnimS('');
    setAnimC('');
    setScreen('spin');
    let count = 0;
    const tk = setInterval(() => {
      setAnimS(studentPool[Math.floor(Math.random()*studentPool.length)].split(' ')[0]);
      setAnimC(countyPool[Math.floor(Math.random()*countyPool.length)].name);
      if (count++%2===0) tick();
    }, 85);
    setTimeout(() => {
      clearInterval(tk);
      setAnimS(s.split(' ')[0]);
      setAnimC(c.name);
      setRolling(false);
      setLanded(true);
      ding();
      const result = {student:s, county:c.name, date:currentDay};
      setLastResult(result);
      const nextState = {...state, picks:{...state.picks,[currentDay]:{student:s,county:c.name}}};
      persist(nextState);
      setTimeout(() => {
        setLanded(false);
        if (remainingCount(nextState)===0) setScreen('graduation');
        else setScreen('reveal');
      }, 2200);
    }, 2200);
  }, [studentPool, countyPool, currentDay, state, settings, todaysPick, tick, ding, resume]);

  const share = () => {
    const p = lastResult||(todaysPick&&{...todaysPick,date:currentDay});
    if (!p) return;
    const f = formatDate(p.date);
    const msg = `Today's drawing (${f.weekday} ${f.month} ${f.day}): ${p.student} & Co. ${p.county}. ✦`;
    if (navigator.share) navigator.share({text:msg}).catch(()=>{});
    else { navigator.clipboard.writeText(msg).catch(()=>{}); alert('Copied to clipboard:\n\n'+msg); }
  };

  const resetAll = () => {
    if (!confirm('Reset all drawn tickets? (testing only)')) return;
    try { localStorage.removeItem(STATE_KEY); } catch(e) {}
    setState(loadState());
    setScreen('home');
    setLastResult(null);
  };

  const goSpin = () => { setAnimS(''); setAnimC(''); setLanded(false); setRolling(false); setScreen('spin'); };

  return (
    <div style={S.root}>
      <div style={{flex:1,overflowY:'auto',WebkitOverflowScrolling:'touch'}}>
        {screen==='home' && <HomeScreen state={state} remaining={remaining} currentDay={currentDay} onSpin={goSpin} settings={settings} allDone={allDone} onGrad={() => setScreen('graduation')}/>}
        {screen==='spin' && <SpinScreen rolling={rolling} animS={animS} animC={animC} onStart={spin} hasSpun={!!animS} landed={landed}/>}
        {screen==='reveal' && <RevealScreen result={lastResult} onHome={() => setScreen('home')} onCal={() => setScreen('ledger')} onShare={share}/>}
        {screen==='ledger' && <LedgerScreen state={state} currentDay={currentDay}/>}
        {screen==='graduation' && <GraduationScreen state={state} onHome={() => setScreen('home')}/>}
        {settings.showTweaks && <Tweaks settings={settings} setSettings={setSettings} onReset={resetAll}/>}
      </div>
      {screen!=='spin' && <Nav screen={screen} setScreen={setScreen} allDone={allDone}/>}
    </div>
  );
}

function Root() {
  return (
    <div className="stage">
      <div className="app-mount">
        <App/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
